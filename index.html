<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script type="module" src="/src/index.ts"></script>
        <link rel="stylesheet" href="/src/animation.css">
        <link rel="stylesheet" href="/src/index.css">
        <link rel="stylesheet" href="/src/table.css">
        <link rel="stylesheet" href="/src/svg.css">
        <title>animation-alu</title>
    </head>
    <body>
        <main>
            <menu type="toolbar">
                <button id="help">Help</button>
                <label for="ciruit">
                    Executing Circuit:
                    <select id="circuit">
                        <option value="int" selected>8-Bit Integer</option>
                        <option value="float"><del>Not Implemented</del></option>
                    </select>
                </label>
                <label for="program">
                    Program:
                    <select id="program">
                        <option value="/dist/AddInt.json">Addition</option>
                        <option value="/dist/SubInt.json">Subtraction</option>
                        <option value="/dist/MultiplyInt.json" selected>Multiplication</option>
                    </select>
                </label>
                <label for="in1">Input 1: <input id="in1" type="number" value="10"></label>
                <label for="in2">Input 2: <input id="in2" type="number" value="6"></label>
                <label for="out">Output: <input type="number" id="out" disabled value="0"></label>
                <a href="https://github.com/FelixBrockwitz-s3005540/animation-alu" target="_blank">Github Repo</a>
            </menu>
            <div id="svg-target"></div>
        </main>
        <aside>
            <menu type="toolbar">
                <button id="reset-program">Reset</button>
                <button id="step">Step</button>
            </menu>
            <div id="table-wrapper">
                <div id="row-highlight"></div>
                <table id="program-table">
                    <tr>
                        <th style="min-width: 3ch;"></th>
                        <th>~A</th>
                        <th>~B</th>
                        <th>c-in</th>
                        <th>~C</th>
                        
                        <th>w<sub>Ak</sub></th>
                        <th>sh<sub>Ak</sub></th>
                        <th>sh<sub>MQ</sub></th>
                        <th>rs<sub>MQ</sub></th>
                        
                        <th>sh-L</th>
                        <th>rs<sub>Ak</sub></th>
                        <th>sMQ0</th>
                        <th>rs<sub>sc</sub></th>
                    </tr>
                    <tr></tr>
                    <tr></tr>
                </table>
            </div>
        </aside>
    </body>
</html>
